<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StudyPlan 学习小站</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <nav class="topbar" aria-label="顶部导航">
        <a class="brand" href="#top" aria-label="StudyPlan 首页">
          <span class="brand-mark">S</span>
          <span>
            <strong>StudyPlan</strong>
            <small>学习小站</small>
          </span>
        </a>
        <div class="api-config" aria-label="服务配置">
          <label for="apiBase">服务地址</label>
          <input id="apiBase" type="url" placeholder="http://localhost:8080" autocomplete="off">
          <button id="saveApiBase" class="button ghost" type="button">保存</button>
        </div>
      </nav>

      <section id="top" class="hero-grid">
        <div class="hero-copy">
          <p class="eyebrow">计划 · 打卡 · 笔记</p>
          <h1>轻松安排学习，随手记录进度。</h1>
          <p>写下目标、勾选完成、保存笔记，让每次学习都有迹可循。</p>
          <div class="hero-actions">
            <button id="refreshAll" class="button primary" type="button">刷新数据</button>
            <a class="button subtle" href="#plan">开始记录</a>
          </div>
        </div>
        <aside class="status-card" aria-live="polite">
          <div class="status-head">
            <span class="pulse" id="healthPulse"></span>
            <span id="healthText">等待刷新</span>
          </div>
          <dl class="health-grid">
            <div>
              <dt>计划状态</dt>
              <dd id="pgStatus">—</dd>
            </div>
            <div>
              <dt>笔记状态</dt>
              <dd id="ossStatus">—</dd>
            </div>
          </dl>
          <p id="lastSync">尚未刷新</p>
        </aside>
      </section>
    </header>

    <main>
      <section class="metrics" aria-label="学习计划统计">
        <article>
          <span>总任务</span>
          <strong id="totalCount">0</strong>
        </article>
        <article>
          <span>已完成</span>
          <strong id="completedCount">0</strong>
        </article>
        <article>
          <span>未完成</span>
          <strong id="incompleteCount">0</strong>
        </article>
        <article>
          <span>完成率</span>
          <strong id="completionRate">0%</strong>
        </article>
      </section>

      <section id="plan" class="panel plan-panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Plan</p>
            <h2>学习计划</h2>
            <p>一行一个目标，完成后直接勾选。</p>
          </div>
          <button id="loadPlan" class="button ghost" type="button">刷新</button>
        </div>

        <div class="next-card" id="nextCard">
          <span>下一步</span>
          <strong id="nextTask">刷新后显示</strong>
        </div>

        <form id="planForm" class="composer">
          <label for="planInput">学习目标</label>
          <textarea id="planInput" rows="7" placeholder="例如：\n读完一章课程\n整理今天的重点\n复盘错题"></textarea>
          <div class="form-actions">
            <button class="button primary" type="submit">保存计划</button>
            <button id="useSamplePlan" class="button subtle" type="button">填入示例</button>
          </div>
        </form>

        <div id="planList" class="task-list" aria-live="polite"></div>
      </section>

      <section id="records" class="panel records-panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Notes</p>
            <h2>学习笔记</h2>
            <p>按主题整理笔记，回顾时更清楚。</p>
          </div>
          <button id="loadTitles" class="button ghost" type="button">刷新</button>
        </div>

        <form id="titleForm" class="inline-form">
          <label class="sr-only" for="titleName">新主题名称</label>
          <input id="titleName" type="text" maxlength="120" placeholder="新建主题，例如：英语阅读">
          <button class="button primary" type="submit">新建主题</button>
        </form>

        <div id="titleList" class="title-list" aria-live="polite"></div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <template id="emptyStateTemplate">
    <div class="empty-state">
      <span>📚</span>
      <strong>暂无内容</strong>
      <p>添加计划或笔记后，这里会显示进展。</p>
    </div>
  </template>

  <script src="./app.js" defer></script>
</body>
</html>
