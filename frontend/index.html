<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StudyPlan 学习小站</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-page="home">
  <div class="app-shell">
    <header class="hero compact-hero">
      <nav class="topbar" aria-label="顶部导航">
        <a class="brand" href="./index.html" aria-label="StudyPlan 首页">
          <span class="brand-mark" aria-hidden="true"><img src="./favicon.svg" alt=""></span>
          <span>
            <strong>StudyPlan</strong>
            <small>学习小站</small>
          </span>
        </a>
        <div class="page-nav" aria-label="页面导航">
          <a class="nav-link active" href="./index.html" aria-current="page">总览</a>
          <a class="nav-link" href="./plan.html">学习计划</a>
          <a class="nav-link" href="./notes.html">学习笔记</a>
        </div>
        <div class="api-config" aria-label="服务配置">
          <label for="apiBase">服务地址</label>
          <input id="apiBase" type="url" placeholder="http://localhost:8080" autocomplete="off">
          <button id="saveApiBase" class="button ghost" type="button">保存</button>
        </div>
      </nav>

      <section id="top" class="hero-grid">
        <div class="hero-copy">
          <p class="eyebrow">Overview</p>
          <h1>学习进度，一眼看清。</h1>
          <p>总览页只展示服务状态、计划统计和下一步行动；计划与笔记已拆分到独立页面，避免内容堆叠。</p>
          <div class="hero-actions">
            <button id="refreshAll" class="button primary" type="button">刷新总览</button>
            <a class="button subtle" href="./plan.html">管理计划</a>
            <a class="button subtle" href="./notes.html">整理笔记</a>
          </div>
        </div>
        <aside class="status-card" aria-live="polite">
          <div class="status-head">
            <span class="pulse" id="healthPulse"></span>
            <span id="healthText">等待刷新</span>
          </div>
          <dl class="health-grid">
            <div>
              <dt>计划状态</dt>
              <dd id="pgStatus">—</dd>
            </div>
            <div>
              <dt>笔记状态</dt>
              <dd id="ossStatus">—</dd>
            </div>
          </dl>
          <p id="lastSync">尚未刷新</p>
        </aside>
      </section>
    </header>

    <main>
      <section class="metrics" aria-label="学习计划统计">
        <article>
          <span>总任务</span>
          <strong id="totalCount">0</strong>
        </article>
        <article>
          <span>已完成</span>
          <strong id="completedCount">0</strong>
        </article>
        <article>
          <span>未完成</span>
          <strong id="incompleteCount">0</strong>
        </article>
        <article>
          <span>完成率</span>
          <strong id="completionRate">0%</strong>
        </article>
      </section>

      <section class="overview-grid" aria-label="快捷入口">
        <article class="panel quick-card">
          <p class="eyebrow">Next</p>
          <h2>下一步</h2>
          <p id="nextTask">刷新后显示</p>
          <a class="button primary" href="./plan.html">查看学习计划</a>
        </article>
        <article class="panel quick-card">
          <p class="eyebrow">Notes</p>
          <h2>学习笔记</h2>
          <p>主题、Markdown 上传和文件列表集中在笔记页维护。</p>
          <a class="button ghost" href="./notes.html">打开学习笔记</a>
        </article>
      </section>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <template id="emptyStateTemplate">
    <div class="empty-state">
      <span>📚</span>
      <strong>暂无内容</strong>
      <p>添加计划或笔记后，这里会显示进展。</p>
    </div>
  </template>

  <script src="./app.js" defer></script>
</body>
</html>
